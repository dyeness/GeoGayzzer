<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGAYZZER — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
</head>
<body>
  <div class="screen active" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="login-container">
      <div class="logo">
        <span class="logo-icon">🌍</span>
        <h1>GeoGAYZZER</h1>
        <p class="subtitle">Угадай, где ты находишься</p>
      </div>
      <div class="login-form">
        <div class="input-group">
          <label for="nickname-input">Никнейм</label>
          <input type="text" id="nickname-input" placeholder="Введи никнейм..." maxlength="20" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="password-input">Пароль</label>
          <input type="password" id="password-input" placeholder="Пароль (мин. 4 символа)..." autocomplete="current-password" />
        </div>
        <div id="auth-error" class="text-error" style="display:none;margin-bottom:8px;"></div>
        <div class="login-buttons">
          <button id="btn-login" class="btn btn-primary btn-lg" disabled>Войти</button>
          <button id="btn-register" class="btn btn-outline btn-lg" disabled>Регистрация</button>
        </div>
        <p class="text-muted" style="margin-top:8px;font-size:13px;">Нет аккаунта? Нажми «Регистрация»</p>
      </div>
    </div>
  </div>

  <script src="/js/player.js"></script>
  <script src="/js/app-login.js"></script>
</body>
</html>
