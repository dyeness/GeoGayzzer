<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGAYZZER — Лобби</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
</head>
<body>

  <!-- ============ LOBBY SCREEN ============ -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <div class="lobby-header">
        <h2>Лобби</h2>
        <div class="room-code-display">
          <span>Код комнаты:</span>
          <strong id="lobby-room-code">------</strong>
          <button id="btn-copy-code" class="btn btn-sm btn-outline" title="Скопировать">📋</button>
        </div>
      </div>
      <div class="lobby-players">
        <h3>Игроки <span id="lobby-player-count">(0/10)</span></h3>
        <ul id="lobby-player-list"></ul>
      </div>
      <!-- Team selector (visible to all when host enables team mode) -->
      <div id="team-selector" class="team-selector hidden">
        <div class="team-selector-title">Выберите команду:</div>
        <div class="team-selector-btns">
          <button id="btn-team-0" class="btn-team btn-team-0">🔴 Красные</button>
          <button id="btn-team-1" class="btn-team btn-team-1">🔵 Синие</button>
        </div>
      </div>

      <!-- Color picker -->
      <div class="color-picker-row">
        <span class="color-picker-label">Цвет:</span>
        <div class="color-swatches" id="color-swatches">
          <!-- Row 1: blues & teals -->
          <button class="color-swatch selected" data-color="#4fc3f7" style="background:#4fc3f7"></button>
          <button class="color-swatch" data-color="#1565c0" style="background:#1565c0"></button>
          <button class="color-swatch" data-color="#26c6da" style="background:#26c6da"></button>
          <button class="color-swatch" data-color="#00897b" style="background:#00897b"></button>
          <!-- Row 2: greens -->
          <button class="color-swatch" data-color="#66bb6a" style="background:#66bb6a"></button>
          <button class="color-swatch" data-color="#2e7d32" style="background:#2e7d32"></button>
          <button class="color-swatch" data-color="#d4e157" style="background:#d4e157"></button>
          <button class="color-swatch" data-color="#a5d6a7" style="background:#a5d6a7"></button>
          <!-- Row 3: yellows & oranges -->
          <button class="color-swatch" data-color="#fdd835" style="background:#fdd835"></button>
          <button class="color-swatch" data-color="#ffa726" style="background:#ffa726"></button>
          <button class="color-swatch" data-color="#ff7043" style="background:#ff7043"></button>
          <button class="color-swatch" data-color="#e64a19" style="background:#e64a19"></button>
          <!-- Row 4: reds & pinks -->
          <button class="color-swatch" data-color="#ef5350" style="background:#ef5350"></button>
          <button class="color-swatch" data-color="#ad1457" style="background:#ad1457"></button>
          <button class="color-swatch" data-color="#f48fb1" style="background:#f48fb1"></button>
          <button class="color-swatch" data-color="#f06292" style="background:#f06292"></button>
          <!-- Row 5: purples & violets -->
          <button class="color-swatch" data-color="#ab47bc" style="background:#ab47bc"></button>
          <button class="color-swatch" data-color="#6a1b9a" style="background:#6a1b9a"></button>
          <button class="color-swatch" data-color="#7986cb" style="background:#7986cb"></button>
          <button class="color-swatch" data-color="#ce93d8" style="background:#ce93d8"></button>
          <!-- Row 6: neutrals -->
          <button class="color-swatch" data-color="#ffffff" style="background:#ffffff"></button>
          <button class="color-swatch" data-color="#b0bec5" style="background:#b0bec5"></button>
          <button class="color-swatch" data-color="#78909c" style="background:#78909c"></button>
          <button class="color-swatch" data-color="#ffcc80" style="background:#ffcc80"></button>
        </div>
      </div>
      <!-- Game Settings (editable by host, read-only for others) -->
      <div id="lobby-settings" class="lobby-settings hidden">
        <div class="settings-header">
          <h3 class="settings-title">&#9881;&#65039; Настройки игры</h3>
          <button id="btn-settings-toggle" class="btn btn-sm btn-outline settings-toggle-btn" title="Свернуть">&#8963;</button>
        </div>
        <div id="lobby-settings-body">
        <div class="setting-row">
          <label class="setting-label">Режим игры</label>
          <select id="setting-mode" class="setting-select">
            <option value="standard">Стандартный</option>
            <option value="team">👥 Командный бой (2 команды)</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label">Количество раундов</label>
          <select id="setting-rounds" class="setting-select">
            <option value="5" selected>5 раундов</option>
            <option value="10">10 раундов</option>
            <option value="15">15 раундов</option>
            <option value="20">20 раундов</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label">Таймер после первого угадывания</label>
          <select id="setting-timer" class="setting-select">
            <option value="0" selected>Отключён</option>
            <option value="30">30 секунд</option>
            <option value="60">60 секунд</option>
            <option value="90">90 секунд</option>
            <option value="120">120 секунд</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label">Бонус за стрик (&lt; 500 км подряд)</label>
          <select id="setting-streak" class="setting-select">
            <option value="1" selected>Включён (+200/+500/+1000)</option>
            <option value="0">Отключён</option>
          </select>
        </div>
        </div><!-- /#lobby-settings-body -->
      </div><!-- /#lobby-settings -->
      <div class="lobby-actions">
        <button id="btn-start-game" class="btn btn-primary btn-lg" style="display:none;">Начать игру</button>
        <button id="btn-force-start" class="btn btn-outline" style="display:none;">⚡ Запустить соло</button>
        <p id="lobby-wait-msg" class="text-muted">Ожидание хоста...</p>
        <button id="btn-leave-lobby" class="btn btn-outline">Покинуть комнату</button>
      </div>

      <!-- Lobby Chat -->
      <div class="lobby-chat">
        <div class="lobby-chat-header">💬 Чат</div>
        <div class="lobby-chat-messages" id="lobby-chat-messages"></div>
        <div class="lobby-chat-input-row">
          <input type="text" id="lobby-chat-input" class="lobby-chat-input" placeholder="Написать сообщение..." maxlength="200" autocomplete="off" />
          <button id="lobby-chat-send" class="btn btn-sm btn-primary">↵</button>
        </div>
      </div>

      <!-- Progress overlay shown while server resolves panoramas -->
      <div id="resolving-overlay" class="resolving-overlay hidden" style="display:none">
        <div class="resolving-spinner"></div>
        <p id="resolving-text">Поиск панорам…</p>
        <div class="resolving-track">
          <div id="resolving-bar" class="resolving-bar" style="width:0%"></div>
        </div>
      </div>
    </div><!-- /.lobby-container -->
  </div><!-- /#screen-lobby -->

  <!-- ============ SCRIPTS ============ -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/network.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app-lobby.js"></script>
</body>
</html>
